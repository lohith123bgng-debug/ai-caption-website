<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Caption Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎬 AI Video Caption & Hashtag Generator</h1>
        <p class="subtitle">Upload your video and get matching captions using Gemini AI!</p>
        
        <div class="upload-box" id="drop-area">
            <input type="file" id="video-input" accept="video/*" hidden>
            <label for="video-input" class="upload-label">
                <div class="upload-icon">📁</div>
                <span>Choose a video file or drag it here</span>
                <p class="file-info">MP4, MOV, AVI (Max 200MB)</p>
            </label>
        </div>

        <div id="video-preview-container" class="hidden">
            <video id="video-preview" controls></video>
            <button id="generate-btn" class="btn">✨ Generate Captions & Hashtags</button>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>AI is thinking, please wait...</p>
        </div>

        <div id="result-box" class="hidden">
            <h3>🤖 Generated Captions & Hashtags:</h3>
            <div id="output-text"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
